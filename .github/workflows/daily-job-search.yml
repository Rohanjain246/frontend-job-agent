name: Daily Job Agent

on:
  schedule:
    - cron: "0 6 * * *"   # runs every day at 6:00 AM UTC
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ FIX: suppresses Node.js 20 deprecation warning

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Agent
        env:
          EMAIL_USER:       ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          REPORT_RECEIVER:  ${{ secrets.REPORT_RECEIVER }}
          GOOGLE_SHEET_ID:  ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=src python src/main.py
          # ✅ FIX: PYTHONPATH=src lets main.py do:
          #         from sources.remoteok import ...
          #         from scorer import ...
          #    without ModuleNotFoundError
