name: Daily Job Agent

on:
  schedule:
    - cron: "0 6 * * *"    # runs every day at 6:00 AM UTC (11:30 AM IST)
  workflow_dispatch:        # also allows manual trigger from Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warning

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Agent
        env:
          # Email notifier (future use)
          EMAIL_USER:       ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          REPORT_RECEIVER:  ${{ secrets.REPORT_RECEIVER }}
          GOOGLE_SHEET_ID:  ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{secrets.GOOGLE_SERVICE_ACCOUNT_JSON}}
          # New sources
          JSEARCH_API_KEY:  ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID:    ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY:   ${{ secrets.ADZUNA_API_KEY }}
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=src python src/main.py

      - name: Upload jobs CSV as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jobs-report-${{ github.run_number }}
          path: reports/jobs.csv
          retention-days: 30
