name: Daily Job Agent

on:
workflow_dispatch:
schedule:
- cron: '30 2 * * *'

jobs:
run:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: pip install -r requirements.txt

  - name: Run Job Agent
    run: python src/main.py
```
