name: Daily Job Agent

on:
  schedule:
    - cron: "30 2 * * *"   # runs every day at 8:00 AM UTC
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ FIX: suppresses Node.js 20 deprecation warning

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Job Agent
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          REPORT_RECEIVER: ${{ secrets.REPORT_RECEIVER }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python src/main.py
        
      - name: Show Reports Folder
        run: |
          ls -la
          ls -la reports || true
      
      - name: Commit Report
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add reports/jobs.csv
          git commit -m "Daily Job Report" || echo "No changes"
          git push
